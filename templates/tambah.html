<!DOCTYPE html>
<html>

<head>

    <title>Tambah Mahasiswa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow p-4">

            <h2 class="mb-4">
                Tambah Data Mahasiswa
            </h2>

            <!-- FORM -->
            <form method="POST"
                  enctype="multipart/form-data">

                <!-- NAMA -->
                <div class="mb-3">

                    <label class="form-label">
                        Nama
                    </label>

                    <input type="text"
                           name="nama"
                           class="form-control"
                           required>

                </div>

                <!-- NIM -->
                <div class="mb-3">

                    <label class="form-label">
                        NIM
                    </label>

                    <input type="text"
                           name="nim"
                           class="form-control"
                           required>

                </div>

                <!-- JURUSAN -->
                <div class="mb-3">

                    <label class="form-label">
                        Jurusan
                    </label>

                    <input type="text"
                           name="jurusan"
                           class="form-control"
                           required>

                </div>

                <!-- FOTO -->
                <div class="mb-3">

                    <label class="form-label">
                        Foto Mahasiswa
                    </label>

                    <input type="file"
                           name="foto"
                           class="form-control"
                           required>

                </div>

                <!-- BUTTON -->
                <button type="submit"
                        class="btn btn-success">

                    Simpan

                </button>

                <a href="/mahasiswa"
                   class="btn btn-secondary">

                    Kembali

                </a>

            </form>

        </div>

    </div>

</body>

</html>
