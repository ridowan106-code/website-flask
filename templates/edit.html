<!DOCTYPE html>
<html>

<head>

    <title>Edit Mahasiswa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow p-4">

            <h2 class="mb-4">
                Edit Data Mahasiswa
            </h2>

            <form method="POST"
                  enctype="multipart/form-data">

                <!-- NAMA -->
                <div class="mb-3">

                    <label>
                        Nama
                    </label>

                    <input type="text"
                           name="nama"
                           class="form-control"
                           value="{{ data.nama }}"
                           required>

                </div>

                <!-- NIM -->
                <div class="mb-3">

                    <label>
                        NIM
                    </label>

                    <input type="text"
                           name="nim"
                           class="form-control"
                           value="{{ data.nim }}"
                           required>

                </div>

                <!-- JURUSAN -->
                <div class="mb-3">

                    <label>
                        Jurusan
                    </label>

                    <input type="text"
                           name="jurusan"
                           class="form-control"
                           value="{{ data.jurusan }}"
                           required>

                </div>

                <!-- FOTO LAMA -->
                <div class="mb-3">

                    <label>
                        Foto Saat Ini
                    </label>

                    <br>

                    <img src="{{ url_for('static', filename='uploads/' + data.foto) }}"
                         width="120"
                         class="rounded">

                </div>

                <!-- FOTO BARU -->
                <div class="mb-3">

                    <label>
                        Ganti Foto
                    </label>

                    <input type="file"
                           name="foto"
                           class="form-control">

                </div>

                <!-- BUTTON -->
                <button type="submit"
                        class="btn btn-primary">

                    Update Data

                </button>

                <a href="/mahasiswa"
                   class="btn btn-secondary">

                    Kembali

                </a>

            </form>

        </div>

    </div>

</body>

</html>
