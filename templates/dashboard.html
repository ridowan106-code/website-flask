<!DOCTYPE html>
<html>

<head>

    <title>Dashboard</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CHART JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-light">

    <div class="container mt-5">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>

                <h2>
                    Dashboard Admin
                </h2>

                <p>
                    Selamat datang,
                    <b>{{ username }}</b>
                </p>

            </div>

            <div>

                <a href="/mahasiswa"
                   class="btn btn-primary">

                    Data Mahasiswa

                </a>

                <a href="/logout"
                   class="btn btn-danger">

                    Logout

                </a>

            </div>

        </div>

        <!-- CARD -->
        <div class="row">

            <!-- TOTAL MAHASISWA -->
            <div class="col-md-6 mb-4">

                <div class="card shadow border-0">

                    <div class="card-body">

                        <h5>
                            Total Mahasiswa
                        </h5>

                        <h1 class="text-primary">
                            {{ total_mahasiswa }}
                        </h1>

                    </div>

                </div>

            </div>

            <!-- TOTAL USER -->
            <div class="col-md-6 mb-4">

                <div class="card shadow border-0">

                    <div class="card-body">

                        <h5>
                            Total User
                        </h5>

                        <h1 class="text-success">
                            {{ total_user }}
                        </h1>

                    </div>

                </div>

            </div>

        </div>

        <!-- GRAFIK -->
        <div class="card shadow border-0 p-4">

            <h4 class="mb-4">
                Grafik Data
            </h4>

            <canvas id="myChart"></canvas>

        </div>

    </div>

    <!-- SCRIPT CHART -->
    <script>

        const ctx = document.getElementById('myChart');

        new Chart(ctx, {

            type: 'bar',

            data: {

                labels: [
                    'Mahasiswa',
                    'User'
                ],

                datasets: [{

                    label: 'Jumlah Data',

                    data: [
                        {{ total_mahasiswa }},
                        {{ total_user }}
                    ],

                    borderWidth: 1

                }]

            },

            options: {

                responsive: true,

                scales: {

                    y: {

                        beginAtZero: true

                    }

                }

            }

        });

    </script>

</body>

</html>
